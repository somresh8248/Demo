<!DOCTYPE html>
<html>

<head>
    <title>PDF Header Footer Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f4f7fb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.08),
                0 2px 10px rgba(0, 0, 0, 0.04);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        .logo {
            width: 260px;
            margin-bottom: 18px;
            object-fit: contain;
        }

        h2 {
            margin: 0 0 30px;
            color: #176b96;
            font-size: 27px;
            font-weight: 700;
            line-height: 1.3;
        }

        input[type="file"] {
            width: 100%;
            padding: 14px;
            border: 2px dashed #c8d8e5;
            border-radius: 14px;
            background: #f9fcff;
            cursor: pointer;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
            margin-bottom: 22px;
        }

        input[type="file"]:hover {
            border-color: #1f6f96;
            background: #f2f9ff;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1f6f96, #155a7a);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 18px rgba(31, 111, 150, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(31, 111, 150, 0.35);
        }

        button:active {
            transform: scale(0.98);
        }

        .info {
            font-size: 13px;
            color: #6f7b88;
            margin-top: 18px;
            line-height: 1.6;
        }

        /* UPDATED MOBILE RESPONSIVE FIXES FOR A BIGGER CONTAINER */
        @media (max-width: 600px) {
            body {
                padding: 12px;
                align-items: center; /* Keeps it vertically centered nicely */
            }

            .container {
                max-width: 100%; /* Spans across the mobile layout safely */
                padding: 40px 24px;
                border-radius: 24px;
            }

            .logo {
                width: 220px;
                margin-bottom: 16px;
            }

            h2 {
                font-size: 24px;
                margin-bottom: 28px;
            }

            input[type="file"] {
                padding: 16px;
                font-size: 14px;
                margin-bottom: 20px;
            }

            button {
                padding: 18px;
                font-size: 16px;
            }

            .info {
                font-size: 13px;
                margin-top: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="srl_diagnostics.png" alt="SRL Diagnostics Logo" class="logo">

        <h2>SRL Diagnostics Collection Centre</h2>

        <input type="file" id="pdfUpload">

        <button onclick="processPDF()">Download Updated PDF</button>

        <div class="info">
            Upload a PDF to add SRL header & footer automatically
        </div>
    </div>

    <script>
        async function processPDF() {
            try {

                const fileInput = document.getElementById('pdfUpload');

                if (!fileInput.files.length) {
                    alert("Upload PDF first");
                    return;
                }

                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();

                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const pages = pdfDoc.getPages();

                const newPdf = await PDFLib.PDFDocument.create();

                const headerBytes = await fetch('header.jpeg').then(res => res.arrayBuffer());
                const headerImage = await newPdf.embedJpg(headerBytes);

                const footerBytes = await fetch('footer.jpeg').then(res => res.arrayBuffer());
                const footerImage = await newPdf.embedJpg(footerBytes);

                for (let i = 0; i < pages.length; i++) {

                    const oldPage = pages[i];
                    const { width, height } = oldPage.getSize();

                    // Reduced header & footer height
                    const headerHeight = 60;
                    const footerHeight = 50;

                    // Keep original page size
                    const newPage = newPdf.addPage([
                        width,
                        height
                    ]);

                    const embeddedPage = await newPdf.embedPage(oldPage);

                    // Draw original PDF page
                    newPage.drawPage(embeddedPage, {
                        x: 0,
                        y: 25,
                        width: width,
                        height: height
                    });

                    // Draw Header at top
                    newPage.drawImage(headerImage, {
                        x: 0,
                        y: height - headerHeight,
                        width: width,
                        height: headerHeight
                    });

                    // Draw Footer at bottom
                    newPage.drawImage(footerImage, {
                        x: 0,
                        y: 0,
                        width: width,
                        height: footerHeight
                    });

                    // Page Number
                    newPage.drawText(`Page ${i + 1}`, {
                        x: width - 80,
                        y: 20,
                        size: 10
                    });
                }
                const pdfBytes = await newPdf.save();

                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;

                const originalFileName = file.name.replace('.pdf', '');
                a.download = originalFileName + '.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

            } catch (error) {
                console.error(error);
                alert("Error processing PDF: " + error.message);
            }
        }
    </script>

</body>

</html>
