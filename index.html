<!DOCTYPE html>
<html>

<head>
    <title>PDF Header Footer Tool</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #1f6f96;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1f6f96;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #155a7a;
        }

        .info {
            font-size: 12px;
            color: #777;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>PDF Header & Footer Tool</h2>

    <input type="file" id="pdfUpload">

    <button onclick="processPDF()">Download Updated PDF</button>

    <div class="info">
        Upload a PDF to add SRL header & footer automatically
    </div>
</div>

<script>
async function processPDF() {
    try {

        const fileInput = document.getElementById('pdfUpload');

        if (!fileInput.files.length) {
            alert("Upload PDF first");
            return;
        }

        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();

        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        const pages = pdfDoc.getPages();

        const newPdf = await PDFLib.PDFDocument.create();

        const headerBytes = await fetch('header.jpeg').then(res => res.arrayBuffer());
        const headerImage = await newPdf.embedJpg(headerBytes);

        const footerBytes = await fetch('footer.jpeg').then(res => res.arrayBuffer());
        const footerImage = await newPdf.embedJpg(footerBytes);

       for (let i = 0; i < pages.length; i++) {

    const oldPage = pages[i];
    const { width, height } = oldPage.getSize();

    // Reduced header & footer height
    const headerHeight = 60;
    const footerHeight = 50;

    // Keep original page size
    const newPage = newPdf.addPage([
        width,
        height
    ]);

    const embeddedPage = await newPdf.embedPage(oldPage);

    // Draw original PDF page
    newPage.drawPage(embeddedPage, {
        x: 0,
        y: 25,
        width: width,
        height: height
    });

    // Draw Header at top
    newPage.drawImage(headerImage, {
        x: 0,
        y: height - headerHeight,
        width: width,
        height: headerHeight
    });

    // Draw Footer at bottom
    newPage.drawImage(footerImage, {
        x: 0,
        y: 0,
        width: width,
        height: footerHeight
    });

    // Page Number
    newPage.drawText(`Page ${i + 1}`, {
        x: width - 80,
        y: 20,
        size: 10
    });
}
        const pdfBytes = await newPdf.save();

        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "Updated_Report.pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

    } catch (error) {
        console.error(error);
        alert("Error processing PDF: " + error.message);
    }
}
</script>

</body>
</html>
